<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1e293b" />
  <title>Bill &amp; Credit Tracker</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/components.css" />
  <link rel="stylesheet" href="./styles/responsive.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">$</span>
      <h1>Bill &amp; Credit Tracker</h1>
    </div>
    <nav class="tabs" role="tablist" aria-label="Sections">
      <button class="tab" role="tab" data-tab="dashboard" aria-selected="true">Dashboard</button>
      <button class="tab" role="tab" data-tab="bills"     aria-selected="false">Bills</button>
      <button class="tab" role="tab" data-tab="credits"   aria-selected="false">Credits</button>
      <button class="tab" role="tab" data-tab="settings"  aria-selected="false">Settings</button>
    </nav>
  </header>

  <main id="view" class="view" aria-live="polite"></main>

  <div id="modal-root" class="modal-root" hidden></div>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
